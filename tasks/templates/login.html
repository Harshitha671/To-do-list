{% load static %}

<!DOCTYPE html>
<html>

<head>
    
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>Login</title>
</head>

<body>

<body class="auth-page">

<div class="auth-container">

    <h2>Welcome Back 👋</h2>

    {% if error %}
        <p class="error">
            {{ error }}
        </p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Username">

        <input type="password"
               name="password"
               placeholder="Password">

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        New User?
        <a href="/signup/">Sign Up</a>
    </p>

</div>

</body>
</html>
