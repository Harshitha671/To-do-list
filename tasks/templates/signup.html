{% load static %}

<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>Signup</title>
</head>

<body>

<body class="auth-page">

<div class="auth-container">

    <h2>Create Account 🚀</h2>

    {% if error %}
        <p class="error">
            {{ error }}
        </p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Username">

        <input type="password"
               name="password"
               placeholder="Password">

        <button type="submit">
            Signup
        </button>

    </form>

    <p>
        Already have an account?
        <a href="/login/">Login</a>
    </p>

</div>

</body>
</html>
